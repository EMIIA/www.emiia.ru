<style>
    :root {
        --brand-dark: #3c78d8;
        --brand-medium: #6d9eeb;
        --brand-light: #a4c2f4;
        --gray-bg: #FFFFFF;
        --gray-border: #E5E5E5;
        --text-main: #111;
        --text-muted: #64748b;
        --radius-lg: 12px;
    }

    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--gray-bg);
        color: var(--text-main);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* --- HEADER --- */
    header {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--gray-border);
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 1000;
        height: 72px;
        box-sizing: border-box;
    }

    .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; color: var(--text-main); }
    .logo-text { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #1f2937; font-weight: 500; letter-spacing: -0.025em; }
    .header-right { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); }

    /* --- Graph Container --- */
    #graph-container {
        flex: 1;
        margin-top: 72px; 
        width: 100%;
        position: relative;
        background: #ffffff;
        touch-action: none;
    }
    
    #graph { width: 100%; height: 100%; cursor: grab; }
    #graph:active { cursor: grabbing; }

    /* --- NODE STYLES --- */
    .node rect {
        fill: var(--brand-dark);
        stroke: #fff;
        stroke-width: 2px;
        rx: var(--radius-lg); ry: var(--radius-lg);
        cursor: pointer;
        transition: fill 0.2s ease;
    }
    .node.active rect { fill: var(--brand-medium); }
    .node text { fill: #ffffff; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; pointer-events: none; }

    /* --- EDGE STYLES --- */
    .edge-path-visual {
        fill: none;
        stroke: var(--gray-border);
        stroke-width: 1.5px;
        transition: stroke 0.2s, stroke-width 0.2s;
        pointer-events: none;
    }
    .edge-path-visual.active {
        stroke: var(--brand-dark);
        stroke-width: 2.5px;
        stroke-dasharray: 6, 3;
    }

    .edge-hitbox {
        fill: none;
        stroke: rgba(0,0,0,0);
        stroke-width: 20px;
        cursor: pointer;
        stroke-linecap: round;
        marker-start: none;
        marker-mid: none;
        marker-end: none;
    }

    .edgePath marker path { fill: var(--gray-border); stroke: none; transition: fill 0.2s; }
    .edgePath.active marker path { fill: var(--brand-dark); }

    /* --- TOOLTIP (Fixed logic) --- */
    .tooltip {
        position: fixed; /* Relative to viewport */
        width: 300px;
        padding: 12px 16px;
        background: #ffffff;
        border: 1px solid var(--gray-border);
        border-radius: var(--radius-lg);
        pointer-events: none;
        font-size: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        line-height: 1.5;
        z-index: 2000;
        color: var(--text-main);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.05s; /* Fast reaction */
    }
    
    .tooltip.visible {
        opacity: 1;
        visibility: visible;
    }
    
    .tooltip-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13px; margin-bottom: 6px; color: var(--brand-dark); border-bottom: 1px solid var(--gray-border); padding-bottom: 6px; }
    .tooltip-formula { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-main); white-space: pre-wrap; word-break: break-word; }

    /* --- FOOTER --- */
    footer {
        border-top: 1px solid var(--gray-border);
        padding: 12px 20px;
        display: flex; justify-content: space-between; align-items: center;
        font-size: 10px; color: var(--text-muted);
        font-family: 'JetBrains Mono', monospace;
        background: #fff; height: 48px;
    }
    .footer-link { display: flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; cursor: pointer; }
    .footer-link svg { width: 14px; height: 14px; }
</style>

<script>
    // --- SETUP & DATA ---
    const g = new dagreD3.graphlib.Graph()
      .setGraph({ rankdir: 'TB', ranksep: 60, edgesep: 25, nodesep: 40, marginx: 20, marginy: 20 })
      .setDefaultEdgeLabel(function() { return {}; });
    g.graph().edge = g.graph().edge || {};
    g.graph().edge.arrowhead = 'normal';

    function wrapText(text, width) {
      const words = text.split(/\s+/); let lines = []; let currentLine = '';
      const padding = 40; const maxWidth = width - padding;
      words.forEach(word => {
        const testLine = currentLine + (currentLine ? ' ' : '') + word;
        if (testLine.length * 6 > maxWidth && currentLine) { lines.push(currentLine); currentLine = word; } 
        else currentLine = testLine;
      });
      if (currentLine) lines.push(currentLine);
      return lines;
    }

    // Nodes & Edges Definition (Same as before)
    g.setNode('Zatraty', { label: 'Затраты', width: 130, height: 50, description: 'Категория: Затраты\nВсе финансовые расходы компании' });
    g.setNode('TCO', { label: 'TCO: $1,5 млрд/год', width: 170, height: 50, description: 'Формула: CapEx + OpEx = $1,5 млрд/год\n\nКомпоненты:\n- CapEx: капитальные затраты\n- OpEx: операционные расходы\n- Включает RSC и CAC' });
    g.setNode('CAC', { label: 'CAC: $3', width: 130, height: 50, description: 'Customer Acquisition Cost\nСтоимость привлечения клиента\n\nЧасть OpEx: $3 на каждого нового пользователя' });
    g.setNode('RSC', { label: 'RSC: $7/год', width: 130, height: 50, description: 'Retention & Support Costs\nЗатраты на удержание и поддержку\n\n$7/год на каждого активного пользователя' });
    g.setNode('CapEx_OpEx', { label: 'CapEx+OpEx', width: 130, height: 50, description: 'Совокупные затраты:\n\nCapEx (капитальные) + OpEx (операционные)\n= $1,5 млрд/год (TCO)' });
    g.setNode('PolzEkonomika', { label: 'Пользовательская экономика', width: 200, height: 50, description: 'Метрики монетизации пользователей' });
    g.setNode('ARPU', { label: 'ARPU: $36/год', width: 140, height: 50, description: 'Average Revenue Per User\nФормула:\nARPU = Общий доход / количество активных пользователей\n\n$3/мес × 12 = $36/год' });
    g.setNode('ARPPU', { label: 'ARPPU: $120/год', width: 150, height: 50, description: 'Average Revenue Per Paying User\nФормула:\nARPPU = Доход от платящих / их количество\n\n$10/мес × 12 = $120/год' });
    g.setNode('Lifetime', { label: 'Срок жизни: 7 лет', width: 150, height: 50, description: 'Средний срок жизни клиента\nИспользуется для расчета LTV' });
    g.setNode('LTV', { label: 'LTV: $791', width: 130, height: 50, description: 'Lifetime Value\nФормула:\nLTV = (ARPPU - RSC) × Срок жизни\n\nРасчет:\n($120 - $7) × 7 лет = $791' });
    g.setNode('Rynok', { label: 'EMIIA.AI SIP: Анализ рынка (2030 год)', width: 260, height: 50, description: 'Рыночные показатели и потенциал на 2030 год' });
    g.setNode('ActiveUsers', { label: 'Активные пользователи (ACTIVE): 100 млн', width: 280, height: 50, description: 'Текущая активная пользовательская база\n\nИспользуется для расчета ARPU' });
    g.setNode('PayingUsers', { label: 'Платящие пользователи (CORE): 30 млн', width: 270, height: 50, description: 'Пользователи, приносящие доход\n\n30% от активных пользователей' });
    g.setNode('PayingRevenue', { label: 'Выручка (ARR): $3,6 млрд/год', width: 220, height: 50, description: 'Формула:\nВыручка ARR = Платящие пользователи × ARPPU\n\n30 млн × $120 = $3,6 млрд/год' });
    g.setNode('ActiveCapacity', { label: 'Потенциальная емкость: $8,4 млрд/год', width: 260, height: 50, description: 'Формула:\nЕмкость = Активные пользователи × ARPU\n\n100 млн × $84 = $8,4 млрд/год\n(ARPPU с 30% скидкой)' });
    g.setNode('TargetMarket', { label: 'Целевой рынок (TARGET - пользователи): 1,67 млрд', width: 320, height: 50, description: 'Совокупный адресуемый рынок (TARGET)\n\nОбъединяет облака, IoT и RTLS' });
    g.setNode('TargetCapacity', { label: 'Емкость рынка: $1,2 трлн/год', width: 220, height: 50, description: 'Максимальный потенциал рынка\n\n$1,2 трлн/год для всех сегментов:\nB2B, B2C, B2G, B2M, M2M, AI' });

    g.setEdge('Zatraty', 'TCO', { description: 'Связь затрат с совокупной стоимостью владения (TCO)' });
    g.setEdge('Zatraty', 'CAC', { description: 'Влияние затрат на привлечение клиентов' });
    g.setEdge('Zatraty', 'RSC', { description: 'Влияние затрат на удержание' });
    g.setEdge('Zatraty', 'CapEx_OpEx', { description: 'Структура затрат' });
    g.setEdge('TCO', 'CAC', { description: 'Формула: TCO = CapEx + OpEx + RSC + CAC' });
    g.setEdge('TCO', 'RSC', { description: 'Формула: TCO = CapEx + OpEx + RSC + CAC' });
    g.setEdge('TCO', 'CapEx_OpEx', { description: 'Формула: TCO = CapEx + OpEx + RSC + CAC' });
    g.setEdge('PolzEkonomika', 'ARPU', { description: 'Средний доход на пользователя' });
    g.setEdge('PolzEkonomika', 'ARPPU', { description: 'Доход от платящего пользователя' });
    g.setEdge('PolzEkonomika', 'Lifetime', { description: 'Время жизни клиента' });
    g.setEdge('PolzEkonomika', 'LTV', { description: 'Пожизненная ценность клиента' });
    g.setEdge('LTV', 'ARPPU', { description: 'LTV = (ARPPU - RSC) × Срок жизни' });
    g.setEdge('LTV', 'RSC', { description: 'LTV = (ARPPU - RSC) × Срок жизни' });
    g.setEdge('LTV', 'Lifetime', { description: 'LTV = (ARPPU - RSC) × Срок жизни' });
    g.setEdge('ARPU', 'PayingRevenue', { description: 'ARPU = Общий доход / Активные' });
    g.setEdge('ARPU', 'ActiveUsers', { description: 'ARPU = Общий доход / Активные' });
    g.setEdge('Rynok', 'ActiveUsers', { description: 'База активных' });
    g.setEdge('Rynok', 'PayingUsers', { description: 'База платящих' });
    g.setEdge('Rynok', 'PayingRevenue', { description: 'Выручка' });
    g.setEdge('Rynok', 'ActiveCapacity', { description: 'Потенциал' });
    g.setEdge('Rynok', 'TargetMarket', { description: 'Объем рынка' });
    g.setEdge('Rynok', 'TargetCapacity', { description: 'Емкость рынка' });
    g.setEdge('PayingRevenue', 'PayingUsers', { description: 'Выручка = CORE × ARPPU' });
    g.setEdge('PayingRevenue', 'ARPPU', { description: 'Выручка = CORE × ARPPU' });
    g.setEdge('ActiveCapacity', 'ActiveUsers', { description: 'Емкость = ACTIVE × ARPU' });
    g.setEdge('ActiveCapacity', 'ARPU', { description: 'Емкость = ACTIVE × ARPU' });

    // --- RENDERING ---
    const svg = d3.select('#graph');
    const inner = svg.append('g');
    const render = new dagreD3.render();
    const tooltip = d3.select("body").append("div").attr("class", "tooltip");

    const oldLabel = dagreD3.label;
    dagreD3.label = function(node) {
      const lines = wrapText(node.label, node.width - 20);
      const tspan = lines.map((line, i) => `<tspan x="0" dy="${i ? 12 : -lines.length * 6}">${line}</tspan>`).join('');
      return `<text text-anchor="middle" x="0" y="0">${tspan}</text>`;
    };
    
    render(inner, g);
    dagreD3.label = oldLabel;

    // Inject Hitboxes
    inner.selectAll("g.edgePath").each(function() {
        const group = d3.select(this);
        const visualPath = group.select("path");
        const pathData = visualPath.attr("d");
        visualPath.classed("edge-path-visual", true);
        if (pathData) group.insert("path", ":first-child").attr("d", pathData).attr("class", "edge-hitbox");
    });

    // --- STATE MANAGEMENT FOR TOOLTIP ---
    let tooltipState = {
        isOpen: false,
        type: null, // 'node' or 'edge'
        target: null, // DOM element for nodes, [x,y] for edges
        html: ""
    };

    function hideTooltip() {
        tooltip.classed("visible", false);
        tooltipState.isOpen = false;
        inner.selectAll(".active").classed("active", false);
    }

    // --- MATH: PROJECT COORDINATES ---
    // Get current zoom transform
    function getCurrentTransform() {
        // We will attach zoom behavior later, so d3.zoomTransform(svg.node()) will work
        return d3.zoomTransform(svg.node());
    }

    // Convert Graph Coords to Screen Coords
    function graphToScreen(x, y) {
        const t = getCurrentTransform();
        // t.apply([x, y]) returns [sx, sy] screen coordinates
        return t.apply([x, y]);
    }

    // --- UPDATE TOOLTIP POSITION (The Core Fix) ---
    function updateTooltipPosition() {
        if (!tooltipState.isOpen) return;

        let left = 0;
        let top = 0;
        const w = 300;
        const h = 150;
        const pad = 15;

        if (tooltipState.type === 'node') {
            // For nodes, we use getBoundingClientRect of the stored DOM element
            // This accounts for any transform automatically
            const nodeRect = tooltipState.target.getBoundingClientRect();
            left = nodeRect.left + nodeRect.width / 2; // Center X
            top = nodeRect.bottom; // Bottom Y
        } else if (tooltipState.type === 'edge') {
            // For edges, we project the stored graph coordinates
            const [sx, sy] = graphToScreen(tooltipState.target[0], tooltipState.target[1]);
            left = sx;
            top = sy;
        }

        // Adjust to center and offset
        let finalLeft = left - w / 2;
        let finalTop = top + 10;

        // Viewport boundaries
        if (finalLeft < pad) finalLeft = pad;
        if (finalLeft + w > window.innerWidth - pad) finalLeft = window.innerWidth - w - pad;
        if (finalTop + h > window.innerHeight - pad) finalTop = top - h - 10; // Flip up

        tooltip
            .style("left", finalLeft + "px")
            .style("top", finalTop + "px");
    }

    // --- ZOOM BEHAVIOR ---
    const zoom = d3.zoom()
      .scaleExtent([0.4, 2])
      .on('zoom', (event) => {
          inner.attr('transform', event.transform);
          // UPDATE TOOLTIP ON EVERY ZOOM MOVE
          updateTooltipPosition();
      });
    
    svg.call(zoom);

    // --- EVENTS ---
    
    // Global Click (Close)
    svg.on("click", function(event) {
        // Only hide if clicking background
        // We stop propagation on nodes/edges, so this only fires for bg
        hideTooltip();
    });

    // Node Click
    inner.selectAll("g.node").on("click", function(event, nodeId) {
        event.stopPropagation();
        
        const node = g.node(nodeId);
        const nodeGroup = this;

        // Update State
        hideTooltip();
        d3.select(nodeGroup).classed("active", true);
        
        tooltipState.isOpen = true;
        tooltipState.type = 'node';
        tooltipState.target = nodeGroup; // Store DOM element
        tooltipState.html = `<div class="tooltip-title">${node.label}</div><div class="tooltip-formula">${node.description.replace(/\n/g, '<br>')}</div>`;
        
        tooltip.html(tooltipState.html);
        updateTooltipPosition(); // Calculate initial pos
        tooltip.classed("visible", true);
    });

    // Edge Click
    inner.selectAll(".edge-hitbox").on("click", function(event) {
        event.stopPropagation();

        const parentGroup = this.parentNode;
        const visualPath = d3.select(parentGroup).select(".edge-path-visual");
        const edgeData = d3.select(parentGroup).datum();
        
        let desc = "Связь элементов";
        if(edgeData) {
            const edgeObj = g.edge(edgeData);
            if(edgeObj && edgeObj.description) desc = edgeObj.description;
        }

        // 1. Get Screen Click Coords
        const [cx, cy] = d3.pointer(event, svg.node()); // Coords relative to SVG element
        
        // 2. Invert to Graph Coords (This is the key for "sticking")
        const t = getCurrentTransform();
        const [gx, gy] = t.invert([cx, cy]); // Convert screen click to internal graph coords

        // Update State
        hideTooltip();
        visualPath.classed("active", true);
        
        tooltipState.isOpen = true;
        tooltipState.type = 'edge';
        tooltipState.target = [gx, gy]; // Store GRAPH coordinates, not screen
        tooltipState.html = `<div class="tooltip-title">Формула связи</div><div class="tooltip-formula">${desc}</div>`;

        tooltip.html(tooltipState.html);
        updateTooltipPosition();
        tooltip.classed("visible", true);
    });

    // Initial Centering
    const graphWidth = g.graph().width;
    const graphHeight = g.graph().height;
    const svgWidth = document.getElementById('graph-container').clientWidth;
    const svgHeight = document.getElementById('graph-container').clientHeight;
    const xCenterOffset = (svgWidth - graphWidth) / 2;
    const yCenterOffset = (svgHeight - graphHeight) / 2;
    svg.call(zoom.transform, d3.zoomIdentity.translate(xCenterOffset, yCenterOffset));

    // CSV
    function downloadCSV() {
      const data = [ ["Категория", "Метрика", "Значение"], ["Затраты", "TCO", "1.5B"] ];
      const csvContent = data.map(r => r.join(",")).join("\n");
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.setAttribute('href', URL.createObjectURL(blob));
      link.setAttribute('download', 'analysis.csv');
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
</script>
